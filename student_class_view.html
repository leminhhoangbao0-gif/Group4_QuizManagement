<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Lớp học</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .btn-start {
            display: block;
            width: 100%;
            padding: 15px;
            background: #22c55e;
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cấu trúc Bài thi</h1>
        <div class="stats">
            <div><strong>Thời gian:</strong> <br> ? Phút</div>
            <div><strong>Số lần thử:</strong> <br> ? lần</div>
            <div><strong>Điểm cao nhất:</strong> <br> ?/10</div>
        </div>

        <p style="color: #64748b; font-size: 14px;">Lưu ý: Sau khi nhấn bắt đầu, thời gian sẽ bắt đầu đếm ngược. Bạn không được chuyển tab trong khi làm bài.</p>

        <a href="/quiz_interface" class="btn-start">BẮT ĐẦU LÀM BÀI</a>
    </div>
</body>
</html>
