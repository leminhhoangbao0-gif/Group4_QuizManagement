<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .menu-card {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

            .menu-card:hover {
                background: #0056b3;
            }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome, Teacher</h1>
        <p>What would you like to do today?</p>

        <div class="menu-grid">
           
            <hr style="margin: 40px 0; border: 1px solid #eee;">

            <h2>Quản lý Lớp học & Học sinh</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

           
            <a href="/manage_classes" class="menu-card">Quản lí Lớp học</a>
            <a href="/manage_students" class="menu-card">Quản lí Học sinh</a>
            <a href="/create_quiz" class="menu-card">Tạo Bài thi mới</a>
        </div>
    </div>
</body>
</html>
